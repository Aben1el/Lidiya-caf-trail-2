<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lidiya Cafe | Signature Menu</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
    /* Updated Hero Styles to match the dark theme */
    .hero { 
        height: 100vh; 
        display: flex; 
        flex-direction: column; 
        justify-content: center; 
        align-items: center; 
        text-align: center; 
        padding: 0 8%; 
        background-color: #121212; /* Dark background from image_241fa4.png */
        color: #fdfbf7; 
    }

    .hero-label { 
        color: #b8860b; 
        text-transform: uppercase; 
        letter-spacing: 8px; 
        font-size: 0.9rem; 
        margin-bottom: 20px; 
        font-weight: 600; 
    }

    .hero h1 { 
        font-family: 'Playfair Display', serif; 
        font-size: clamp(3rem, 8vw, 6rem); 
        margin-bottom: 20px; 
        line-height: 1; 
    }

    .sub-headline {
        font-size: 1.2rem;
        margin-bottom: 40px;
        opacity: 0.8;
        max-width: 600px;
    }

    .button-group {
        display: flex;
        gap: 20px;
    }

    .btn-solid { 
        padding: 18px 45px; 
        border-radius: 50px; 
        border: none; 
        cursor: pointer; 
        font-weight: 600; 
        background: #c5a059; /* Matching the button color in image_241fa4.png */
        color: #121212;
    }

    .btn-outline { 
        padding: 18px 45px; 
        border-radius: 50px; 
        border: 1px solid #c5a059; 
        cursor: pointer; 
        font-weight: 600; 
        background: transparent; 
        color: #c5a059;
    }
</style>

<section class="hero" id="home">
    <div class="hero-label">LIDIYA CAFE</div>
    <h1>Taste the Difference</h1>
    <p class="sub-headline">Artisanal coffee, freshly baked cakes, and gourmet fast food — a space designed for connection.</p>
    
    <div class="button-group">
        <button class="btn-solid">ORDER ONLINE</button>
        <button class="btn-outline">EXPLORE MENU</button>
    </div>
</section>

</body>
</html>
