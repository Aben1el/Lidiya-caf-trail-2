<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lidiya Cafe | The Perfect Experience</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0907; --glass: rgba(26, 24, 21, 0.7); }
        
        /* THIS IS THE KEY LINE FOR SMOOTH ANIMATION */
        html { scroll-behavior: smooth; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: #ffffff; line-height: 1.6; overflow-x: hidden; }

        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 8%; background: rgba(18, 16, 13, 0.9); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: 2px; color: var(--gold); }
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav a { color: #fff; text-decoration: none; transition: 0.3s; cursor: pointer; }
        nav a:hover { color: var(--gold); }

        /* Hero, Menu, Contact, etc... (The rest of your structure remains the same) */
        .hero { height: 90vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 5rem; margin-bottom: 20px; }
        
        #menu { padding: 80px 8%; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; overflow: hidden; }
        .img-wrap { overflow: hidden; height: 250px; }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .card:hover img { transform: scale(1.15); }
        .card-body { padding: 25px; }

        #contact { padding: 80px 8%; display: grid; grid-template-columns: 1fr 1fr; gap: 50px; align-items: center; }
        .map-container { width: 100%; height: 400px; border-radius: 15px; overflow: hidden; border: 1px solid var(--gold); }
        .btn { padding: 15px 40px; border-radius: 50px; border: none; cursor: pointer; font-weight: 600; background: var(--gold); transition: 0.3s; }
        .btn:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">LIDIYA CAFE</div>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#menu">Menu</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section class="hero" id="home" data-aos="fade-in">
        <h1>Taste the Difference</h1>
        <button class="btn" style="margin-top: 30px;">ORDER ONLINE</button>
    </section>

    <section id="menu">
        <h2 data-aos="fade-up" style="text-align: center; font-size: 3rem; margin-bottom: 50px;">Our Selection</h2>
        <div class="menu-grid">
            <div class="card" data-aos="fade-up"><div class="img-wrap"><img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=800" alt="Cake"></div><div class="card-body"><h3>Black Forest</h3><p>$8.50</p></div></div>
            <div class="card" data-aos="fade-up"><div class="img-wrap"><img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=800" alt="Burger"></div><div class="card-body"><h3>Signature Burger</h3><p>$14.50</p></div></div>
            <div class="card" data-aos="fade-up"><div class="img-wrap"><img src="https://images.unsplash.com/photo-1628840042765-356cda07504e?w=800" alt="Pizza"></div><div class="card-body"><h3>Pepperoni Supreme</h3><p>$15.00</p></div></div>
        </div>
    </section>

    <section id="contact" data-aos="fade-up">
        <div>
            <h2>Come Say Hello</h2>
            <p style="margin: 20px 0;">123 Main Street, Addis Ababa</p>
        </div>
        <div class="map-container">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3940.665715878477!2d38.7578!3d9.0142!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zOcKwMDAnNTEuMSJOIDM4wrA0NScyOC4xIkU!5e0!3m2!1sen!2set!4v1620000000000" width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>
