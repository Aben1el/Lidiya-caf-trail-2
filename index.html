<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lidiya Cafe | Artisanal Coffee & Dining</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; color: #333; background-color: #fdfcf8; }
        
        /* Navigation - Styled like image_3e635e.png */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 8%; background: #fdfcf8; }
        .logo { font-size: 1.6rem; font-weight: 700; }
        
        nav ul { display: flex; list-style: none; gap: 15px; align-items: center; }
        
        /* Touchable Nav Links */
        nav a { 
            text-decoration: none; 
            color: #333; 
            padding: 10px 20px; 
            border-radius: 50px; 
            transition: all 0.3s ease; 
        }
        nav a:hover { background: #f0ede5; }
        
        /* Order Button - The Gold Pill */
        .order-btn { 
            background: #d4af37; /* Gold color */
            color: #000; 
            padding: 12px 30px; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: 600;
        }

        .hero { text-align: center; padding: 120px 8%; background-color: #f7f4ee; }
        
        #menu { padding: 80px 8%; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .card { background: #fdfcf8; padding: 20px; border: 1px solid #eee; transition: all 0.4s ease; }
        .card:hover { background: #ffffff; transform: translateY(-10px); }
        .card img { width: 100%; height: 250px; object-fit: cover; margin-bottom: 15px; }

        footer { padding: 50px 8%; background: #f7f4ee; text-align: center; color: #777; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">LIDIYA CAFE</div>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#menu">Menu</a></li>
            <li><a href="#contact">Contact</a></li>
            <li><button class="order-btn">ORDER ONLINE</button></li>
        </ul>
    </nav>

    <section id="home" class="hero">
        <h1>Taste the Difference</h1>
        <p>Artisanal coffee, freshly baked cakes, and gourmet fast food.</p>
    </section>

    <section id="menu">
        <div class="menu-grid">
            <article class="card">
                <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=500&h=300&fit=crop" alt="Cake">
                <h3>Black Forest Cake</h3>
            </article>
            <article class="card">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500&h=300&fit=crop" alt="Burger">
                <h3>Signature Burger</h3>
            </article>
            <article class="card">
                <img src="https://images.unsplash.com/photo-1628840042765-356cda07504e?w=500&h=300&fit=crop" alt="Pizza">
                <h3>Pepperoni Supreme</h3>
            </article>
        </div>
    </section>

    <footer>
        <p>123 Main Street | Open Daily: 7:00 AM — 10:00 PM</p>
    </footer>

</body>
</html>
