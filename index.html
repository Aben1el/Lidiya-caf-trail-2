<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lidiya Cafe | Artisanal Coffee & Dining</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Dark Theme Background */
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #12100d; 
            color: #ffffff; 
            line-height: 1.6; 
        }

        /* Hero Section matching image_3e5be1.png */
        .hero { 
            text-align: center; 
            padding: 150px 8%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .hero-label { 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 0.8rem; 
            color: #d4af37; 
            margin-bottom: 20px; 
        }

        .hero h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 5rem; 
            line-height: 1.1; 
            max-width: 800px; 
            margin-bottom: 20px; 
        }

        .hero p { 
            color: #a0a0a0; 
            max-width: 500px; 
            margin-bottom: 40px; 
        }

        /* Gold Button Styling */
        .btn-container { display: flex; gap: 20px; }
        
        .btn { 
            padding: 15px 40px; 
            border-radius: 50px; 
            border: none; 
            cursor: pointer; 
            font-weight: 600; 
            transition: 0.3s; 
        }
        
        .btn-primary { background: #d4af37; color: #000; }
        .btn-secondary { background: transparent; border: 1px solid #d4af37; color: #d4af37; }
        
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-label">LIDIYA CAFE</div>
        <h1>Taste the Difference</h1>
        <p>Artisanal coffee, freshly baked cakes, and gourmet fast food — a space designed for connection.</p>
        
        <div class="btn-container">
            <button class="btn btn-primary">ORDER ONLINE</button>
            <button class="btn btn-secondary">EXPLORE MENU</button>
        </div>
    </section>

</body>
</html>
