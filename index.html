<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lidiya Cafe | Refined Dining</title>
    <style>
        :root {
            --bg-color: #fdfbf7;
            --text-color: #3e362e;
            --accent-color: #b8860b;
            --card-bg: #f5f0e6;
        }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; }

        /* Hero Section (Based on image_338639.png, colored white) */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 8%; }
        .hero-label { color: var(--accent-color); text-transform: uppercase; letter-spacing: 8px; font-size: 0.9rem; margin-bottom: 20px; font-weight: 600; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 5rem; margin-bottom: 20px; }
        .hero p { font-size: 1.2rem; margin-bottom: 40px; max-width: 600px; }
        .btn-group { display: flex; gap: 20px; }
        .btn { padding: 18px 45px; border-radius: 50px; border: none; cursor: pointer; font-weight: 600; text-transform: uppercase; }
        .btn-solid { background: var(--accent-color); color: white; }
        .btn-outline { border: 2px solid var(--accent-color); background: transparent; color: var(--accent-color); }

        /* Contact Section (Based on image_23a7e0.png, colored white) */
        .contact-section { padding: 100px 8%; text-align: center; }
        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; margin-top: 50px; }
        .contact-card { background: var(--card-bg); padding: 40px; border-radius: 20px; }
        .contact-card h3 { margin: 20px 0; font-family: 'Playfair Display', serif; }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-label">LIDIYA CAFE</div>
        <h1>Taste the Difference</h1>
        <p>Artisanal coffee, freshly baked cakes, and gourmet fast food — a space designed for connection.</p>
        <div class="btn-group">
            <button class="btn btn-solid">ORDER ONLINE</button>
            <button class="btn btn-outline">EXPLORE MENU</button>
        </div>
    </section>

    <section class="contact-section">
        <div class="hero-label">VISIT US</div>
        <h2 style="font-family: 'Playfair Display', serif; font-size: 3rem;">Come Say Hello</h2>
        <div class="contact-grid">
            <div class="contact-card">
                <h3>Location</h3>
                <p>123 Main Street, Addis Ababa</p>
            </div>
            <div class="contact-card">
                <h3>Hours</h3>
                <p>7:00 AM – 10:00 PM, Open Daily</p>
            </div>
            <div class="contact-card">
                <h3>Contact</h3>
                <p>+251 911 000 000<br>hello@lidiyacafe.com</p>
            </div>
        </div>
    </section>

</body>
</html>
