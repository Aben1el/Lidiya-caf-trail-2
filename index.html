<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lidiya Cafe | Magical Unicorn Dream</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        /* Unicorn Chaos Palette */
        :root {
            --neon-pink: #ff00ff;
            --unicorn-purple: #9b59b6;
            --cherry-blossom: #ffb7c5;
            --magical-gold: #f1c40f;
            --bg-color: #fff0f5;
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #fbc2eb 100%);
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
        }

        /* Minecraft-ish Cherry Leaves in Corners */
        .leaf {
            position: fixed;
            width: 100px; height: 100px;
            background: #ffb7c5;
            border: 4px solid #d63384;
            border-radius: 10px;
            z-index: 999;
            box-shadow: 5px 5px 0px #8e44ad;
        }
        .top-left { top: 10px; left: 10px; }
        .top-right { top: 10px; right: 10px; }

        /* Content Styling */
        .container { 
            background: rgba(255, 255, 255, 0.8); 
            margin: 50px 10%; 
            padding: 50px; 
            border: 10px dashed var(--neon-pink);
            border-radius: 30px;
        }

        h1, h2 { color: var(--neon-pink); text-shadow: 2px 2px #fff; text-align: center; }

        .card { 
            background: #fff; 
            border: 5px solid var(--magical-gold); 
            padding: 20px; 
            border-radius: 20px; 
            transform: rotate(-2deg);
            transition: 0.3s;
        }
        .card:hover { transform: rotate(2deg) scale(1.05); }

        .btn-unicorn {
            background: var(--neon-pink);
            color: white;
            padding: 20px 40px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 10px 0 #b300b3;
        }
    </style>
</head>
<body>

    <div class="leaf top-left"></div>
    <div class="leaf top-right"></div>

    <div class="container">
        <h1>LIDIYA CAFE: UNICORN EDITION</h1>
        <p style="text-align: center; font-size: 1.5rem;">✨ Artisanal coffee, magic, and pure joy! ✨</p>
        
        <div style="text-align: center; margin: 40px;">
            <button class="btn-unicorn">ORDER MAGIC ONLINE</button>
        </div>

        <div class="menu-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="card"><h3>Black Forest Dream</h3><p>$8.50</p></div>
            <div class="card"><h3>Signature Glitter Burger</h3><p>$14.50</p></div>
        </div>
    </div>

</body>
</html>
