<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lidiya Cafe | Interactive Menu</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --warm-white: #fdfbf7; 
            --cream: #f5f0e6; 
            --text-dark: #3e362e; 
            --accent: #b8860b;
        }

        /* Interactive Menu Card */
        .card { 
            position: relative; 
            height: 400px; 
            border-radius: 25px; 
            overflow: hidden; 
            cursor: pointer; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .card img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: transform 0.8s ease; 
        }

        /* Hidden Description Overlay */
        .card-overlay { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(253, 251, 247, 0.95); 
            padding: 30px; 
            transform: translateY(100%); 
            transition: transform 0.5s ease; 
        }

        /* Interaction on Hover */
        .card:hover img { transform: scale(1.1); }
        .card:hover .card-overlay { transform: translateY(0); }

        .card-overlay h3 { color: var(--accent); font-family: 'Playfair Display', serif; margin-bottom: 10px; }
    </style>
</head>
<body>

    <section id="menu" style="padding: 100px 8%;">
        <div class="menu-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px;">
            
            <!-- Menu Item 1 -->
            <div class="card" data-aos="fade-up">
                <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=800" alt="Cake">
                <div class="card-overlay">
                    <h3>Black Forest Cake</h3>
                    <p style="color: var(--text-dark);">Rich chocolate sponge, cherry filling, and whipped cream. 450 ETB</p>
                </div>
            </div>

            <!-- Menu Item 2 -->
            <div class="card" data-aos="fade-up" data-aos-delay="100">
                <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=800" alt="Burger">
                <div class="card-overlay">
                    <h3>The Signature Burger</h3>
                    <p style="color: var(--text-dark);">Double smashed patties, aged cheddar, and house-made sauce. 750 ETB</p>
                </div>
            </div>

            <!-- Menu Item 3 -->
            <div class="card" data-aos="fade-up" data-aos-delay="200">
                <img src="https://images.unsplash.com/photo-1628840042765-356cda07504e?w=800" alt="Pizza">
                <div class="card-overlay">
                    <h3>Pepperoni Supreme</h3>
                    <p style="color: var(--text-dark);">Crispy edge, double pepperoni, and mozzarella perfection. 800 ETB</p>
                </div>
            </div>

        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 1200, once: true });</script>
</body>
</html>
